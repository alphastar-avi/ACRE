name: Release ACRE Binary

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
          - goos: linux
            goarch: arm64 # Add if needed, excluded to keep build fast
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Binary
        run: |
          mkdir -p dist
          BINARY_NAME="acre"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="acre.exe"
          fi
          cd orchestrator
          env GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o ../dist/acre-${{ matrix.goos }}-${{ matrix.goarch }}-${BINARY_NAME} main.go

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
          name: ${{ github.ref_name == 'main' && 'Latest Bleeding Edge Release' || format('Release {0}', github.ref_name) }}
          draft: false
          prerelease: ${{ github.ref_name == 'main' }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
